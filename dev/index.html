<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Solid Chat</title>
    <style>
      body {
        margin: 10%;
      }
      input {
        background-color: #eef;
        padding: 0.5em;
        border: 0.5em solid white;
        font-size: 120%;
      }
    </style>
  </head>
  <body>
    <h1>Solid Chat</h1>
    <div>
      <div id="webId"></div>
    </div>
    <div id="loginBanner"></div>
    <div>
      <label for="chatUri">Chat link:</label>
      <input id="chatUri" size="90" placeholder="https://pod.example/public/longChat/index.ttl#this" />
      <button id="loadChat">Load chat</button>
      <div id="currentChat"></div>
    </div>
    <p>
      A handy app for chatting with other Solid users
    </p>
    <div id="menu"></div>
    <div id="chatPane"></div>
    <!-- div from chatPane.render will be inserted here -->
  </body>
</html>
